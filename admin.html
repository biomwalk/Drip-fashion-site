<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drip Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink: #FF2D78;
      --black: #0A0A0A;
      --white: #FAFAFA;
      --gray: #888;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
    }
    body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    nav {
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-size: 20px; font-weight: 700; letter-spacing: 4px; color: var(--pink); }
    .badge { font-size: 11px; color: var(--gray); letter-spacing: 2px; }
    #login, #dashboard { max-width: 900px; margin: 60px auto; padding: 0 24px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .sub { color: var(--gray); font-size: 14px; margin-bottom: 40px; }
    input {
      width: 100%; padding: 14px 16px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 14px;
      margin-bottom: 12px; outline: none;
    }
    input:focus { border-color: var(--pink); }
    button {
      background: var(--pink); color: white; border: none;
      padding: 14px 32px; font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500; cursor: pointer; width: 100%;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    button.secondary {
      background: transparent; border: 1px solid var(--border);
      color: var(--white); width: auto; padding: 8px 20px; font-size: 12px;
    }
    button.secondary:hover { border-color: var(--pink); color: var(--pink); }
    .error { color: #ff4444; font-size: 13px; margin-bottom: 12px; }
    .stats { display: flex; gap: 1px; background: var(--border); margin-bottom: 32px; }
    .stat { background: var(--black); padding: 24px 32px; flex: 1; }
    .stat-num { font-size: 32px; font-weight: 700; color: var(--pink); }
    .stat-label { font-size: 12px; color: var(--gray); letter-spacing: 1px; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 11px; letter-spacing: 2px; color: var(--gray); text-align: left; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
    tr:hover td { background: var(--surface); }
    .score { color: var(--pink); font-weight: 700; }
    .shopify-yes { color: #4CAF50; font-size: 12px; }
    .shopify-no { color: #ff4444; font-size: 12px; }
    .domain { color: var(--gray); font-size: 12px; }
    .approve-btn {
      background: var(--pink); color: white; border: none;
      padding: 6px 16px; font-size: 12px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-weight: 500;
      transition: opacity 0.2s; white-space: nowrap;
    }
    .approve-btn:hover { opacity: 0.8; }
    .approve-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .approved { color: #4CAF50; font-size: 12px; font-weight: 500; }
    #dashboard { display: none; }
    .section-title { font-size: 11px; letter-spacing: 3px; color: var(--pink); margin-bottom: 16px; }
    .empty { color: var(--gray); font-size: 14px; padding: 40px 0; text-align: center; }
  </style>
</head>
<body>
<nav>
  <span class="logo">DRIP</span>
  <span class="badge">ADMIN DASHBOARD</span>
</nav>

<div id="login">
  <h1>Admin Access</h1>
  <p class="sub">Enter your admin token to continue.</p>
  <div id="login-error" class="error" style="display:none"></div>
  <input type="password" id="token-input" placeholder="Admin token" />
  <button onclick="doLogin()">Sign In</button>
</div>

<div id="dashboard">
  <h1>Brand Review Queue</h1>
  <p class="sub" id="queue-sub">Loading...</p>

  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="stat-pending">—</div>
      <div class="stat-label">PENDING REVIEW</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-shopify">—</div>
      <div class="stat-label">SHOPIFY STORES</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-avg-score">—</div>
      <div class="stat-label">AVG CONFIDENCE</div>
    </div>
  </div>

  <p class="section-title">PENDING BRANDS</p>
  <div id="table-wrap">
    <table>
      <thead>
        <tr>
          <th>BRAND</th>
          <th>SHOPIFY</th>
          <th>CONFIDENCE</th>
          <th>SUBMITTED</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="brand-rows"></tbody>
    </table>
    <div id="empty-state" class="empty" style="display:none">No brands pending review 🎉</div>
  </div>

  <div style="margin-top:60px">
    <p class="section-title">TAXONOMY HEALTH — LAST 30 DAYS</p>
    <div class="stats" id="skip-stats" style="margin-bottom:32px"></div>
    <div id="skip-tables"></div>
  </div>
</div>

<script>
const API = 'https://drip-production-a900.up.railway.app/api/v1'
let adminToken = ''

function doLogin() {
  const val = document.getElementById('token-input').value.trim()
  if (!val) return
  adminToken = val
  loadDashboard()
    loadSkippedSummary()
}

document.getElementById('token-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin()
})

async function loadDashboard() {
  try {
    const res = await fetch(`${API}/brands/admin/pending?token=${adminToken}`)
    if (res.status === 401) {
      document.getElementById('login-error').textContent = 'Invalid token.'
      document.getElementById('login-error').style.display = 'block'
      return
    }
    const brands = await res.json()
    document.getElementById('login').style.display = 'none'
    document.getElementById('dashboard').style.display = 'block'

    const shopifyCount = brands.filter(b => b.is_shopify).length
    const avgScore = brands.length
      ? Math.round(brands.reduce((s, b) => s + (b.fashion_confidence_score ?? 0), 0) / brands.length)
      : 0

    document.getElementById('stat-pending').textContent = brands.length
    document.getElementById('stat-shopify').textContent = shopifyCount
    document.getElementById('stat-avg-score').textContent = brands.length ? avgScore + '%' : '—'
    document.getElementById('queue-sub').textContent =
      brands.length + ' brand' + (brands.length !== 1 ? 's' : '') + ' awaiting review'

    const tbody = document.getElementById('brand-rows')
    tbody.innerHTML = ''

    if (brands.length === 0) {
      document.getElementById('table-wrap').querySelector('table').style.display = 'none'
      document.getElementById('empty-state').style.display = 'block'
      return
    }

    for (const b of brands) {
      const date = new Date(b.submitted_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
      const score = b.fashion_confidence_score ? Math.round(b.fashion_confidence_score) : '?'
      const tr = document.createElement('tr')
      tr.id = 'row-' + b.id
      tr.innerHTML = `
        <td>
          <div style="font-weight:500">${b.name}</div>
          <div class="domain"><a href="https://${b.domain}" target="_blank" style="color:var(--gray)">${b.domain}</a></div>
        </td>
        <td><span class="${b.is_shopify ? 'shopify-yes' : 'shopify-no'}">${b.is_shopify ? '✓ Shopify' : '✗ Other'}</span></td>
        <td><span class="score">${score}%</span></td>
        <td style="color:var(--gray);font-size:13px">${date}</td>
        <td><button class="approve-btn" id="btn-${b.id}" onclick="approve('${b.id}', '${b.name}')">Approve</button></td>
      `
      tbody.appendChild(tr)
    }
  } catch (err) {
    document.getElementById('login-error').textContent = 'Connection error. Is the backend running?'
    document.getElementById('login-error').style.display = 'block'
  }
}

async function approve(brandId, brandName) {
  const btn = document.getElementById('btn-' + brandId)
  btn.disabled = true
  btn.textContent = 'Approving...'
  try {
    const res = await fetch(`${API}/brands/admin/approve/${brandId}?token=${adminToken}`, { method: 'POST' })
    if (res.ok) {
      btn.outerHTML = '<span class="approved">✓ Approved</span>'
    } else {
      btn.disabled = false
      btn.textContent = 'Retry'
    }
  } catch {
    btn.disabled = false
    btn.textContent = 'Retry'
  }
}

async function loadSkippedSummary() {
  try {
    const res = await fetch(`${API}/brands/admin/skipped-summary?token=${adminToken}`)
    if (!res.ok) return
    const data = await res.json()

    const LABELS = {
      no_category_match: 'NO CATEGORY MATCH',
      non_fashion_blocklist: 'BLOCKLISTED',
      no_price: 'NO PRICE',
    }

    const statsEl = document.getElementById('skip-stats')
    if (!data.length) {
      statsEl.innerHTML = '<div style="color:var(--gray);font-size:14px;padding:24px 0">No skipped products in the last 30 days</div>'
      return
    }

    for (const row of data) {
      const label = LABELS[row.skip_reason] || row.skip_reason.toUpperCase().replace(/_/g, ' ')
      const div = document.createElement('div')
      div.className = 'stat'
      div.innerHTML = `<div class="stat-num">${row.count}</div><div class="stat-label">${label}</div>`
      statsEl.appendChild(div)
    }

    const tablesEl = document.getElementById('skip-tables')
    for (const row of data) {
      if (!row.examples.length) continue
      const label = LABELS[row.skip_reason] || row.skip_reason
      const section = document.createElement('div')
      section.style.marginBottom = '40px'
      section.innerHTML = `
        <p class="section-title" style="margin-top:32px">${label} — RECENT EXAMPLES</p>
        <table>
          <thead>
            <tr>
              <th>TITLE</th>
              <th>PRODUCT TYPE</th>
              <th>ATTEMPTED CATEGORY</th>
            </tr>
          </thead>
          <tbody>
            ${row.examples.map(e => `
              <tr>
                <td>${e.title || '—'}</td>
                <td style="color:var(--gray);font-size:12px">${e.product_type || '—'}</td>
                <td style="color:var(--gray);font-size:12px">${e.attempted_category || '—'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `
      tablesEl.appendChild(section)
    }
  } catch (err) {
    console.warn('Failed to load skipped summary', err)
  }
}

</script>
</body>
</html>
